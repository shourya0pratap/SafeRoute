{% extends "layout.html" %} {% block title %}SafeRoute | Live Navigation{%
endblock %} {% block head %}
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"
/>

<style>
  body {
    overflow: hidden;
  }
  .dashboard-container {
    display: flex;
    height: 100vh;
    padding-top: 70px;
  }

  .sidebar {
    width: 350px;
    background: #1e293b;
    padding: 2rem;
    border-right: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    overflow-y: auto;
  }
  .sidebar h3 {
    font-size: 1.2rem;
    color: var(--primary);
    margin-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding-bottom: 0.5rem;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .control-group label {
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .control-group input {
    padding: 0.8rem;
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    border-radius: 8px;
    font-family: "Inter", sans-serif;
  }

  .btn-update {
    background: var(--gradient);
    color: white;
    border: none;
    padding: 1rem;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  .btn-update:hover {
    opacity: 0.9;
  }

  .map-area {
    flex-grow: 1;
    background: #0f172a;
    position: relative;
  }
  #live-map {
    width: 100%;
    height: 100%;
  }
</style>
{% endblock %} {% block content %}
<nav class="navbar" style="padding: 1rem 5%">
  <div class="logo">
    <i class="fa-solid fa-shield-halved"></i> SafeRoute Navigation
  </div>
  <ul class="nav-links">
    <li>
      <a href="/"><i class="fa-solid fa-house"></i> Exit Navigation</a>
    </li>
  </ul>
</nav>

<div class="dashboard-container">
  <aside class="sidebar">
    <h3><i class="fa-solid fa-route"></i> Route Planner</h3>

<div class="control-group">
    <label for="start-location">Origin</label>
    <input type="text" id="start-location" value="Gurgaon" placeholder="e.g. Gurgaon">
</div>

<div class="control-group">
    <label for="end-location">Destination</label>
    <input type="text" id="end-location" value="Sohna" placeholder="e.g. Sohna">
</div>

<button class="btn-update" onclick="geocodeAndRoute()"><i class="fa-solid fa-location-arrow"></i> Find Safest Route</button>

    <div
      id="route-stats"
      style="
        margin-top: 1rem;
        color: #10b981;
        font-weight: bold;
        font-size: 0.9rem;
      "
    ></div>
  </aside>

  <main class="map-area">
    <div id="live-map"></div>
  </main>
</div>
{% endblock %} {% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
  // 1. Initialize Map (Centered on Andhra Pradesh based on your dataset)
  var map = L.map("live-map").setView([14.74, 78.57], 11);

  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: "&copy; CARTO",
  }).addTo(map);

  var routingControl = null;
  var clusterLayer = L.layerGroup().addTo(map);

  // 2. Load the Danger Spots
  function loadBlackSpots() {
    fetch("/api/clusters")
      .then((res) => res.json())
      .then((data) => {
        if (data.error) return;
        data.forEach((spot) => {
          let color =
            spot.Risk_Level === "High"
              ? "#f43f5e"
              : spot.Risk_Level === "Moderate"
                ? "#f59e0b"
                : "#10b981";
          L.circleMarker([spot.Latitude, spot.Longitude], {
            radius: 8,
            color: color,
            fillColor: color,
            fillOpacity: 0.5,
          }).addTo(clusterLayer);
        });
      });
  }

  // 3. Draw the Route using OSRM
  function calculateSafeRoute() {
    let startInput = document.getElementById("start-coords").value.split(",");
    let endInput = document.getElementById("end-coords").value.split(",");

    let startLat = parseFloat(startInput[0]),
      startLon = parseFloat(startInput[1]);
    let endLat = parseFloat(endInput[0]),
      endLon = parseFloat(endInput[1]);

    if (routingControl) {
      map.removeControl(routingControl);
    }

    routingControl = L.Routing.control({
      waypoints: [L.latLng(startLat, startLon), L.latLng(endLat, endLon)],
      router: L.Routing.osrmv1({
        serviceUrl: "https://router.project-osrm.org/route/v1",
      }),
      lineOptions: { styles: [{ color: "#3b82f6", opacity: 0.8, weight: 6 }] },
      createMarker: function () {
        return null;
      }, // Hides default markers
      show: false, // Hides the text instructions
    }).addTo(map);

    routingControl.on("routesfound", function (e) {
      let routes = e.routes;
      let distanceKm = (routes[0].summary.totalDistance / 1000).toFixed(1);
      let timeMin = Math.round(routes[0].summary.totalTime / 60);

      document.getElementById("route-stats").innerHTML =
        `Safest Route Found!<br>Distance: ${distanceKm} km<br>Est. Time: ${timeMin} mins`;
    });
  }

  // Load spots on startup
  document.addEventListener("DOMContentLoaded", loadBlackSpots);
</script>
{% endblock %}
