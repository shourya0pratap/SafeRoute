{% extends "layout.html" %} {% block title %}SafeRoute | Live Navigation{%
endblock %} {% block head %}
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"
/>

<style>
  body {
    overflow: hidden;
  }
  .dashboard-container {
    display: flex;
    height: 100vh;
    padding-top: 70px;
  }

  .sidebar {
    width: 350px;
    background: #1e293b;
    padding: 2rem;
    border-right: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    overflow-y: auto;
  }
  .sidebar h3 {
    font-size: 1.2rem;
    color: var(--primary);
    margin-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding-bottom: 0.5rem;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .control-group label {
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .control-group input {
    padding: 0.8rem;
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    border-radius: 8px;
    font-family: "Inter", sans-serif;
  }

  .btn-update {
    background: var(--gradient);
    color: white;
    border: none;
    padding: 1rem;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  .btn-update:hover {
    opacity: 0.9;
  }

  .map-area {
    flex-grow: 1;
    background: #0f172a;
    position: relative;
  }
  #live-map {
    width: 100%;
    height: 100%;
  }
</style>
{% endblock %} {% block content %}
<nav class="navbar" style="padding: 1rem 5%">
  <div class="logo">
    <i class="fa-solid fa-shield-halved"></i> SafeRoute Navigation
  </div>
  <ul class="nav-links">
    <li>
      <a href="/"><i class="fa-solid fa-house"></i> Exit Navigation</a>
    </li>
  </ul>
</nav>

<div class="dashboard-container">
  <aside class="sidebar">
    <h3><i class="fa-solid fa-route"></i> Route Planner</h3>

    <div class="control-group">
      <label for="start-location">Origin</label>
      <input
        type="text"
        id="start-location"
        value="Gurgaon"
        placeholder="e.g. Gurgaon"
      />
    </div>

    <div class="control-group">
      <label for="end-location">Destination</label>
      <input
        type="text"
        id="end-location"
        value="Sohna"
        placeholder="e.g. Sohna"
      />
    </div>

    <button class="btn-update" onclick="geocodeAndRoute()">
      <i class="fa-solid fa-location-arrow"></i> Find Safest Route
    </button>

    <div
      id="route-stats"
      style="
        margin-top: 1rem;
        color: #10b981;
        font-weight: bold;
        font-size: 0.9rem;
      "
    ></div>
  </aside>

  <main class="map-area">
    <div id="live-map"></div>
  </main>
</div>
{% endblock %} {% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
  // 1. Initialize Map (Centered on Delhi NCR / Gurgaon)
  var map = L.map("live-map").setView([28.4595, 77.0266], 11);

  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: "&copy; CARTO",
  }).addTo(map);

  var routingControl = null;
  var clusterLayer = L.layerGroup().addTo(map);

  // 2. Load the Danger Spots
  function loadBlackSpots() {
    fetch("/api/clusters")
      .then((res) => res.json())
      .then((data) => {
        if (data.error) return;
        data.forEach((spot) => {
          let color =
            spot.Risk_Level === "High"
              ? "#f43f5e"
              : spot.Risk_Level === "Moderate"
                ? "#f59e0b"
                : "#10b981";
          L.circle([spot.Latitude, spot.Longitude], {
            radius: 500, // This is now exactly 500 real-world meters!
            color: color,
            fillColor: color,
            fillOpacity: 0.5,
          }).addTo(clusterLayer);
        });
      })
      .catch((err) => console.error("Error loading spots:", err));
  }

  // 3. Geocode text to coordinates and draw route
  async function geocodeAndRoute() {
    let startText = document.getElementById("start-location").value;
    let endText = document.getElementById("end-location").value;

    document.getElementById("route-stats").innerHTML =
      "Calculating coordinates...";

    try {
      // Fetch coordinates for Origin
      let startRes = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${startText}`,
      );
      let startData = await startRes.json();

      // Fetch coordinates for Destination
      let endRes = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${endText}`,
      );
      let endData = await endRes.json();

      if (startData.length === 0 || endData.length === 0) {
        alert(
          "Could not find one of the locations. Please try adding the state or country.",
        );
        document.getElementById("route-stats").innerHTML =
          "Location not found.";
        return;
      }

      let startLat = parseFloat(startData[0].lat),
        startLon = parseFloat(startData[0].lon);
      let endLat = parseFloat(endData[0].lat),
        endLon = parseFloat(endData[0].lon);

      // Remove old route if it exists
      if (routingControl) {
        map.removeControl(routingControl);
      }

      // Draw the new route using the fetched coordinates
      routingControl = L.Routing.control({
        waypoints: [L.latLng(startLat, startLon), L.latLng(endLat, endLon)],
        router: L.Routing.osrmv1({
          serviceUrl: "https://router.project-osrm.org/route/v1",
        }),
        lineOptions: {
          styles: [{ color: "#3b82f6", opacity: 0.8, weight: 6 }],
        },
        createMarker: function () {
          return null;
        },
        show: false,
      }).addTo(map);

      // --- THE SAFETY EVALUATION LOGIC ---
      routingControl.on("routesfound", async function (e) {
        let routes = e.routes;
        let distanceKm = (routes[0].summary.totalDistance / 1000).toFixed(1);
        let timeMin = Math.round(routes[0].summary.totalTime / 60);

        // Show a loading state while Python does the heavy lifting
        document.getElementById("route-stats").innerHTML =
          `Route Found!<br>Distance: ${distanceKm} km<br>Est. Time: ${timeMin} mins<br>
                     <span style="color: #3b82f6;">Analyzing Route Safety...</span>`;

        // Extract the GPS coordinates of the blue line
        let routeCoords = routes[0].coordinates.map((c) => ({
          lat: c.lat,
          lon: c.lng,
        }));

        // Send the coordinates to Flask
        try {
          let response = await fetch("/api/evaluate_route", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ waypoints: routeCoords }),
          });

          let safetyData = await response.json();

          if (safetyData.error) {
            document.getElementById("route-stats").innerHTML +=
              `<br><span style="color: red;">Error: ${safetyData.error}</span>`;
            return;
          }

          // Determine text color based on danger level
          let statusColor = "#10b981"; // Green
          if (safetyData.status === "High Risk Zone") statusColor = "#f43f5e"; // Red
          if (safetyData.status === "Moderate Caution") statusColor = "#f59e0b"; // Orange

          // Update the UI with the final Safety Score!
          document.getElementById("route-stats").innerHTML = `
                        Route Found!<br>
                        Distance: ${distanceKm} km<br>
                        Est. Time: ${timeMin} mins<br><br>
                        <div style="padding: 10px; background: rgba(0,0,0,0.2); border-left: 4px solid ${statusColor}; border-radius: 4px;">
                            <span style="color: ${statusColor}; font-weight: bold;">
                                <i class="fa-solid fa-triangle-exclamation"></i> ${safetyData.status}
                            </span><br>
                            <span style="color: #cbd5e1; font-size: 0.85rem;">
                                Risk Penalty: ${safetyData.penalty_score}<br>
                                Black Spots Crossed: ${safetyData.black_spots_intersected}
                            </span>
                        </div>
                    `;
        } catch (error) {
          console.error("Safety evaluation failed:", error);
          document.getElementById("route-stats").innerHTML +=
            `<br><span style="color: red;">Safety check failed.</span>`;
        }
      });
    } catch (error) {
      console.error("Geocoding failed:", error);
      document.getElementById("route-stats").innerHTML = "Routing failed.";
    }
  }

  // 4. Auto-load the spots when the page first opens
  document.addEventListener("DOMContentLoaded", loadBlackSpots);
</script>
{% endblock %}
